<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U.S. Defense Industry Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --panel-bg: #0f1525;
    --panel-border: #1e2d4a;
    --accent: #3b82f6;
    --accent2: #10b981;
    --accent3: #f59e0b;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --tag-bg: #1e2d4a;
    --r: 4px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--panel-border);
    background: var(--panel-bg);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
  }
  header .source-tag {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .legend {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-muted);
  }
  .legend-bar {
    display: flex;
    height: 8px;
    border-radius: 2px;
    overflow: hidden;
    width: 120px;
  }
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  /* MAP */
  .map-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    min-width: 0;
  }
  #map svg {
    width: 100%;
    height: 100%;
  }
  .state-path {
    stroke: #1a2540;
    stroke-width: 0.5;
    cursor: pointer;
    transition: stroke 0.15s, stroke-width 0.15s;
  }
  .state-path:hover {
    stroke: #60a5fa;
    stroke-width: 1.5;
  }
  .state-path.selected {
    stroke: #f59e0b;
    stroke-width: 2;
  }
  .tooltip {
    position: absolute;
    background: rgba(15,21,37,0.95);
    border: 1px solid var(--panel-border);
    border-radius: var(--r);
    padding: 8px 12px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 10;
  }
  .tooltip .tt-name { font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .tooltip .tt-val { color: var(--accent); font-size: 11px; }
  .hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  /* PANEL */
  .panel {
    width: 420px;
    background: var(--panel-bg);
    border-left: 1px solid var(--panel-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.25s ease;
    flex-shrink: 0;
  }
  .panel.empty {
    width: 0;
    border-left: none;
  }
  .panel-inner {
    width: 420px;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--panel-border);
    flex-shrink: 0;
  }
  .panel-state-name {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 6px;
  }
  .panel-kpis {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .kpi {
    background: var(--tag-bg);
    border-radius: var(--r);
    padding: 8px 10px;
  }
  .kpi-val {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 2px;
  }
  .kpi-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }
  /* TABS */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--panel-border);
    flex-shrink: 0;
    overflow-x: auto;
  }
  .tab {
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  #panel-content {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    min-height: 0;
  }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }
  /* SECTIONS */
  .section { margin-bottom: 20px; }
  .section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--panel-border);
  }
  /* ECON GRID */
  .econ-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .econ-cell {
    background: var(--tag-bg);
    border-radius: var(--r);
    padding: 10px 12px;
  }
  .econ-val { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .econ-label { font-size: 10px; color: var(--text-muted); }
  /* PERSONNEL */
  .pers-bar-wrap { margin-bottom: 8px; }
  .pers-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }
  .pers-label { font-size: 11px; color: var(--text-dim); width: 110px; flex-shrink: 0; }
  .pers-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--tag-bg);
    border-radius: 3px;
    overflow: hidden;
  }
  .pers-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .pers-count { font-size: 11px; color: var(--text-dim); width: 60px; text-align: right; flex-shrink: 0; }
  /* CONTRACT TYPE */
  .type-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }
  .type-label { font-size: 11px; color: var(--text-dim); width: 130px; flex-shrink: 0; }
  .type-bar-bg { flex: 1; height: 6px; background: var(--tag-bg); border-radius: 3px; overflow: hidden; }
  .type-bar-fill { height: 100%; border-radius: 3px; }
  .type-pct { font-size: 11px; color: var(--text-dim); width: 38px; text-align: right; flex-shrink: 0; }
  /* CONTRACTORS */
  .contractor-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid var(--panel-border);
  }
  .contractor-row:last-child { border-bottom: none; }
  .c-rank {
    font-size: 10px;
    color: var(--text-muted);
    width: 16px;
    text-align: center;
    flex-shrink: 0;
  }
  .c-name { flex: 1; font-size: 12px; color: var(--text); }
  .c-bar-wrap { width: 60px; flex-shrink: 0; }
  .c-bar-bg { height: 4px; background: var(--tag-bg); border-radius: 2px; overflow: hidden; }
  .c-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; }
  .c-amt { font-size: 11px; color: var(--accent); width: 56px; text-align: right; flex-shrink: 0; font-weight: 600; }
  /* INSTALLATIONS */
  .inst-branch {
    margin-bottom: 12px;
  }
  .inst-branch-name {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .inst-tag {
    display: inline-block;
    background: var(--tag-bg);
    border-radius: 3px;
    padding: 3px 7px;
    font-size: 10px;
    color: var(--text-dim);
    margin: 2px;
  }
  .inst-tag.joint { border: 1px solid var(--accent3); color: var(--accent3); }
  /* FFRDC */
  .ffrdc-card {
    background: var(--tag-bg);
    border-radius: var(--r);
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .ffrdc-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .ffrdc-admin { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; }
  .ffrdc-sponsor { font-size: 10px; color: var(--text-muted); }
  .ffrdc-badge {
    display: inline-block;
    font-size: 9px;
    padding: 2px 5px;
    border-radius: 2px;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-top: 4px;
  }
  .ffrdc-badge.dod { background: rgba(59,130,246,0.2); color: var(--accent); }
  .ffrdc-badge.doe { background: rgba(245,158,11,0.2); color: var(--accent3); }
  .ffrdc-badge.dhs { background: rgba(16,185,129,0.2); color: var(--accent2); }
  /* CONGRESSIONAL */
  .committee-block { margin-bottom: 16px; }
  .committee-name {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .member-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--panel-border);
  }
  .member-row:last-child { border-bottom: none; }
  .party-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .party-R { background: #ef4444; }
  .party-D { background: #3b82f6; }
  .party-I { background: #a78bfa; }
  .member-name { flex: 1; font-size: 12px; color: var(--text); }
  .member-role { font-size: 10px; color: var(--text-muted); }
  .member-dist { font-size: 10px; color: var(--text-muted); margin-left: 4px; }
  .no-data {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    padding: 8px 0;
  }
  /* PROMPT */
  .prompt {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    text-align: center;
    gap: 12px;
    padding: 40px;
  }
  .prompt-icon { font-size: 40px; opacity: 0.3; }
  .prompt-text { font-size: 13px; line-height: 1.6; }
</style>
</head>

// ── UTILITIES ──────────────────────────────────────────────────────────────
function fmt(n) {
  if (n == null) return 'N/A';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(0) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(0) + 'K';
  return '$' + n;
}
function fmtNum(n) {
  if (n == null) return 'N/A';
  return n.toLocaleString();
}
function pct(n) {
  if (n == null) return 'N/A';
  return n.toFixed(1) + '%';
}

// ── COLOR SCALE ────────────────────────────────────────────────────────────
const allSpending = Object.values(DEFENSE_DATA.states).map(s => s.economic_footprint.total_defense_spending).filter(Boolean);
const colorScale = d3.scaleQuantile()
  .domain(allSpending)
  .range(['#eff6ff','#dbeafe','#bfdbfe','#93c5fd','#60a5fa','#2563eb','#1d4ed8']);

// ── LEGEND ─────────────────────────────────────────────────────────────────
const colors = ['#eff6ff','#dbeafe','#bfdbfe','#93c5fd','#60a5fa','#2563eb','#1d4ed8'];
const lb = document.getElementById('legendBar');
colors.forEach(c => {
  const seg = document.createElement('div');
  seg.style.cssText = 'flex:1;background:'+c;
  lb.appendChild(seg);
});
const sorted = [...allSpending].sort((a,b) => a-b);
document.getElementById('legendMin').textContent = fmt(sorted[0]);
document.getElementById('legendMax').textContent = fmt(sorted[sorted.length-1]);

// ── STATE NAME -> DATA KEY MAP ─────────────────────────────────────────────
// topoJSON uses state names; our data keys are full state names
const stateNames = Object.keys(DEFENSE_DATA.states);

// ── MAP ────────────────────────────────────────────────────────────────────
const mapContainer = document.getElementById('map');
let selectedState = null;
let svgEl = null;

function buildMap(us) {
  const states = topojson.feature(us, us.objects.states);
  const mesh = topojson.mesh(us, us.objects.states, (a,b) => a !== b);
  
  // Name lookup from FIPS: use state name property from topojson
  const stateName = us.objects.states.geometries.reduce((acc, g) => {
    acc[g.id] = g.properties.name;
    return acc;
  }, {});

  const rect = mapContainer.getBoundingClientRect();
  const W = rect.width, H = rect.height;

  const projection = d3.geoAlbersUsa().fitSize([W, H], states);
  const path = d3.geoPath().projection(projection);

  svgEl = d3.select('#map').append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('preserveAspectRatio', 'xMidYMid meet')
    .style('width', '100%')
    .style('height', '100%');

  const tooltip = document.getElementById('tooltip');
  const ttName = document.getElementById('tt-name');
  const ttVal = document.getElementById('tt-val');

  svgEl.selectAll('.state-path')
    .data(states.features)
    .enter().append('path')
    .attr('class', 'state-path')
    .attr('d', path)
    .attr('fill', d => {
      const name = stateName[d.id];
      const sd = DEFENSE_DATA.states[name];
      if (!sd) return '#1a2540';
      return colorScale(sd.economic_footprint.total_defense_spending);
    })
    .on('mousemove', function(event, d) {
      const name = stateName[d.id];
      const sd = DEFENSE_DATA.states[name];
      ttName.textContent = name || 'Unknown';
      ttVal.textContent = sd ? fmt(sd.economic_footprint.total_defense_spending) + '  (Rank #' + sd.economic_footprint.total_spending_rank + ')' : 'No data';
      tooltip.style.opacity = '1';
      const cr = mapContainer.getBoundingClientRect();
      let x = event.clientX - cr.left + 12;
      let y = event.clientY - cr.top - 10;
      if (x + 180 > cr.width) x -= 200;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    })
    .on('mouseleave', function() {
      tooltip.style.opacity = '0';
    })
    .on('click', function(event, d) {
      const name = stateName[d.id];
      if (!name || !DEFENSE_DATA.states[name]) return;
      
      svgEl.selectAll('.state-path').classed('selected', false);
      d3.select(this).classed('selected', true);
      selectedState = name;
      document.getElementById('hint').style.display = 'none';
      renderPanel(name);
    });

  // State borders
  svgEl.append('path')
    .datum(mesh)
    .attr('d', path)
    .attr('fill', 'none')
    .attr('stroke', '#1a2540')
    .attr('stroke-width', 0.5);
}

// Load US atlas
fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
  .then(r => r.json())
  .then(us => buildMap(us))
  .catch(e => {
    document.getElementById('map').innerHTML = '<div style="color:#ef4444;padding:20px;font-size:13px;">Failed to load map tiles. Check network access.</div>';
    console.error(e);
  });

let activeTab = 'overview';

function renderPanel(stateName) {
  const sd = DEFENSE_DATA.states[stateName];
  if (!sd) return;
  
  const panel = document.getElementById('panel');
  panel.classList.remove('empty');
  
  const ef = sd.economic_footprint;
  const pers = sd.personnel;
  
  document.getElementById('panel-content').innerHTML = `
    <div class="panel-header">
      <div class="panel-state-name">${stateName}</div>
      <div class="panel-kpis">
        <div class="kpi">
          <div class="kpi-val">${fmt(ef.total_defense_spending)}</div>
          <div class="kpi-label">Total Spending</div>
        </div>
        <div class="kpi">
          <div class="kpi-val">#${ef.total_spending_rank ?? 'N/A'}</div>
          <div class="kpi-label">National Rank</div>
        </div>
        <div class="kpi">
          <div class="kpi-val">${pct(ef.gdp_share_pct)}</div>
          <div class="kpi-label">% State GDP</div>
        </div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab ${activeTab==='overview'?'active':''}" onclick="switchTab('overview')">Overview</div>
      <div class="tab ${activeTab==='contractors'?'active':''}" onclick="switchTab('contractors')">Contractors</div>
      <div class="tab ${activeTab==='installations'?'active':''}" onclick="switchTab('installations')">Installations</div>
      <div class="tab ${activeTab==='ffrdc'?'active':''}" onclick="switchTab('ffrdc')">FFRDCs</div>
      <div class="tab ${activeTab==='congressional'?'active':''}" onclick="switchTab('congressional')">Congress</div>
      <div class="tab ${activeTab==='sources'?'active':''}" onclick="switchTab('sources')">Sources</div>
    </div>
    <div class="panel-body" id="tab-body">
      ${renderTab(activeTab, sd)}
    </div>
  `;
}

function switchTab(tab) {
  activeTab = tab;
  const sd = DEFENSE_DATA.states[selectedState];
  document.querySelectorAll('.tab').forEach(t => {
    const map = {overview:'Overview',contractors:'Contractors',installations:'Installations',ffrdc:'FFRDCs',congressional:'Congress',sources:'Sources'};
    t.classList.toggle('active', map[tab] === t.textContent);
  });
  document.getElementById('tab-body').innerHTML = renderTab(tab, sd);
}

function renderTab(tab, sd) {
  if (tab === 'overview') return renderOverview(sd);
  if (tab === 'contractors') return renderContractors(sd);
  if (tab === 'installations') return renderInstallations(sd);
  if (tab === 'ffrdc') return renderFFRDC(sd);
  if (tab === 'congressional') return renderCongressional(sd);
  if (tab === 'sources') return renderSources(sd);
  return '';
}

      fields: 'Member name, party, state, committee role, ex officio status',
      vintage: '119th Congress (Jan 2025 – Jan 2027). Fetched June 24, 2026.'
    },
    {
      category: 'Congressional Committees',
      name: 'House Committee on Foreign Affairs (HFAC)',
      title: '119th Congress Membership Roster',
      description: 'Official member list for HFAC. Chairman: Brian Mast (R-FL-21). 25R + 22D voting members (territory delegates Radewagen/AS and Moylan/GU excluded). HFAC has jurisdiction over U.S. foreign policy, foreign assistance, State Department authorization, and arms sales.',
      url: 'https://foreignaffairs.house.gov/about/membership',
      fields: 'Member name, party, state, congressional district, committee role',
      vintage: '119th Congress (Jan 2025 – Jan 2027). Roster page last updated July 31, 2025; fetched June 24, 2026.'
    },
    {
      category: 'Congressional Committees',
      name: 'Senate Committee on Foreign Relations (SFRC)',
      title: '119th Congress Membership Roster',
      description: 'Official roster per GPO Committee Print S. PRT. 2025 119-4 (May 2025). Chairman: James E. Risch (R-ID); Ranking Member: Jeanne Shaheen (D-NH). 12R + 10D = 22 members. SFRC has jurisdiction over treaties, ambassador confirmations, foreign assistance authorization, and U.S. foreign policy.',
      url: 'https://www.foreign.senate.gov/about/membership',
      fields: 'Member name, party, state, committee role',
      vintage: '119th Congress (Jan 2025 – Jan 2027). GPO print May 2025; confirmed via press releases through June 24, 2026.'
    },
    {
      category: 'Map Boundaries',
      name: 'U.S. Census Bureau / Mike Bostock (Observable)',
      title: 'us-atlas — U.S. States Topography (states-10m.json)',
      description: 'Simplified topographic boundaries for U.S. states and territories, derived from U.S. Census Bureau TIGER/Line shapefiles. Used solely for rendering clickable state polygons on the map.',
      url: 'https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json',
      fields: 'State boundary polygons, FIPS codes, state names',
      vintage: 'Based on 2020 Census TIGER/Line data.'
    }
  ];

  const categories = [...new Set(sources.map(s => s.category))];

  return `
    <div class="section">
      <div class="section-title">Data Sources &amp; Methodology</div>
      <div style="background:#0d1f12;border:1px solid #166534;border-radius:var(--r);padding:12px 14px;margin-bottom:12px;">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:#4ade80;margin-bottom:6px;">&#x1F9EA; FFRDC Location Methodology Note</div>
        <p style="font-size:11px;color:var(--text-dim);line-height:1.6;margin-bottom:4px;">
          The NSF FFRDC list gives each center's <strong style="color:var(--text);">"administrator location"</strong> — the headquarters of the administering organization — not necessarily where the defense research is conducted. This affects several entries:
        </p>
        <ul style="font-size:11px;color:var(--text-dim);line-height:1.7;padding-left:16px;margin-bottom:4px;">
          <li><strong style="color:var(--text);">RAND Corporation (Arroyo Center, NDRI, Project Air Force)</strong> — listed under California (Santa Monica HQ), but RAND's Arlington, VA office conducts substantial national security and defense policy work for DoD clients. RAND's own DHS FFRDC (HSOAC) is formally located in Arlington. Virginia's defense research role is understated as a result.</li>
          <li><strong style="color:var(--text);">Sandia National Laboratories</strong> — listed under New Mexico (Albuquerque HQ). A major secondary site in Livermore, CA co-located with LLNL conducts parallel nuclear weapons physics work. This map adds a separate California entry to reflect it.</li>
          <li><strong style="color:var(--text);">MITRE National Security Engineering Center</strong> — listed under Virginia (McLean). Until the 2025 NSF update it was also listed under Massachusetts (Bedford campus, co-located with Hanscom AFB). The 2026 list reflects only McLean.</li>
        </ul>
        <p style="font-size:11px;color:var(--text-muted);">Where locations are known to be materially incomplete, supplemental notes appear on individual FFRDC cards.</p>
      </div>
      <p style="font-size:11px;color:var(--text-dim);line-height:1.6;margin-bottom:12px;">
        This map draws on six primary sources, all official U.S. government publications except the map boundary tiles.
        Every data point shown in this panel can be traced to one of the sources below.
        Dollar figures are not adjusted for inflation. All data reflects the fiscal year or Congress noted.
      </p>
      <div style="background:#1a1200;border:1px solid #92400e;border-radius:var(--r);padding:12px 14px;margin-bottom:16px;">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent3);margin-bottom:6px;">&#9888; Important Scope Limitation</div>
        <p style="font-size:11px;color:var(--text-dim);line-height:1.6;margin-bottom:6px;">
          The OLDCC state totals sum to <strong style="color:var(--text);">$606.7B</strong> — only about two-thirds of the DoD's full FY2024 budget authority of <strong style="color:var(--text);">$909.6B</strong>.
          The remaining <strong style="color:var(--text);">~$303B (33%)</strong> is not reflected in any state's figure. It flows to:
        </p>
        <ul style="font-size:11px;color:var(--text-dim);line-height:1.7;padding-left:16px;margin-bottom:6px;">
          <li><strong style="color:var(--text);">Overseas operations and bases</strong> — spending in Germany, Japan, South Korea, the Middle East, and all other foreign locations is excluded. OLDCC covers only the 50 states and D.C.</li>
          <li><strong style="color:var(--text);">Non-attributable spending</strong> — contract and payroll records that cannot be assigned to a specific domestic location are omitted.</li>
          <li><strong style="color:var(--text);">Budget authority vs. obligations</strong> — OLDCC measures actual contract obligations, payroll, and grants flowing to specific places, which is a subset of the full Congressional appropriation.</li>
        </ul>
        <p style="font-size:11px;color:var(--text-muted);line-height:1.6;">
          As a result, state figures represent each state's share of <em>domestically-attributed</em> DoD spending — not each state's share of the total defense budget.
          States with large overseas force structure (e.g., those contributing units deployed abroad) may appear smaller on this map than their full strategic significance would suggest.
          U.S. territories (Puerto Rico, Guam, etc.) are covered in a separate OLDCC supplemental report not included here.
        </p>
      </div>
      ${categories.map(cat => `
        <div style="margin-bottom:20px;">
          <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent3);margin-bottom:10px;">${cat}</div>
          ${sources.filter(s => s.category === cat).map(s => `
            <div style="background:var(--tag-bg);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;">
              <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;">${s.title}</div>
              <div style="font-size:11px;color:var(--accent);margin-bottom:6px;">${s.name}</div>
              <div style="font-size:11px;color:var(--text-dim);line-height:1.55;margin-bottom:6px;">${s.description}</div>
              <div style="font-size:10px;color:var(--text-muted);margin-bottom:3px;"><span style="color:var(--text-dim);">Fields:</span> ${s.fields}</div>
              <div style="font-size:10px;color:var(--text-muted);margin-bottom:6px;"><span style="color:var(--text-dim);">Vintage:</span> ${s.vintage}</div>
              <a href="${s.url}" target="_blank" rel="noopener" style="font-size:10px;color:var(--accent);text-decoration:none;word-break:break-all;">${s.url}</a>
            </div>`).join('')}
        </div>`).join('')}
    </div>
  `;
}

function renderOverview(sd) {
  const ef = sd.economic_footprint;
  const pers = sd.personnel;
  const ct = ef.contract_by_type || {};
  const totalContract = ef.contract_spending || 1;
  
  const svcColors = { army: '#f59e0b', air_force: '#3b82f6', navy_marines: '#10b981', other_defense: '#8b5cf6' };
  const typeColors = { 'Service': '#3b82f6', 'Supplies and Equipment': '#10b981', 'Research and Development': '#f59e0b', 'Construction': '#ef4444' };
  
  const persTotal = pers.total || 1;
  const persTypes = [
    { label: 'Active Duty', val: pers.by_type.active_duty, color: '#ef4444' },
    { label: 'Civilian', val: pers.by_type.civilian, color: '#3b82f6' },
    { label: 'National Guard', val: pers.by_type.national_guard, color: '#10b981' },
    { label: 'Reserve', val: pers.by_type.reserve, color: '#f59e0b' },
  ];
  const persSvc = [
    { label: 'Army', val: pers.by_service.army, color: '#f59e0b' },
    { label: 'Air Force', val: pers.by_service.air_force, color: '#3b82f6' },
    { label: 'Navy / Marines', val: pers.by_service.navy_marines, color: '#10b981' },
    { label: 'Other Defense', val: pers.by_service.other_defense, color: '#8b5cf6' },
  ];

  const typeOrder = ['Service', 'Supplies and Equipment', 'Research and Development', 'Construction'];
  const typeRows = typeOrder.map(t => {
    const amt = ct[t] || 0;
    return { label: t, amt, pct: totalContract > 0 ? (amt/totalContract*100) : 0 };
  }).filter(r => r.amt > 0);

  return `
    <div class="section">
      <div class="section-title">Economic Footprint</div>
      <div class="econ-grid">
        <div class="econ-cell"><div class="econ-val">${fmt(ef.contract_spending)}</div><div class="econ-label">Contract Spending</div></div>
        <div class="econ-cell"><div class="econ-val">${fmt(ef.payroll)}</div><div class="econ-label">Personnel Payroll</div></div>
        <div class="econ-cell"><div class="econ-val">${fmt(ef.grants)}</div><div class="econ-label">Grant Spending</div></div>
        <div class="econ-cell"><div class="econ-val">#${ef.gdp_share_rank ?? 'N/A'}</div><div class="econ-label">GDP Share Rank</div></div>
        <div class="econ-cell"><div class="econ-val">$${ef.total_defense_spending ? (ef.total_defense_spending/1000).toFixed(0) : 'N/A'}</div><div class="econ-label">Per $1K GDP</div></div>
        <div class="econ-cell"><div class="econ-val">${fmtNum(pers.total)}</div><div class="econ-label">Total Personnel</div></div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">Personnel by Type</div>
      ${persTypes.map(p => `
        <div class="pers-row">
          <span class="pers-label">${p.label}</span>
          <div class="pers-bar-bg"><div class="pers-bar-fill" style="width:${p.val ? Math.round(p.val/persTotal*100) : 0}%;background:${p.color}"></div></div>
          <span class="pers-count">${p.val ? fmtNum(p.val) : 'N/A'}</span>
        </div>`).join('')}
    </div>
    
    <div class="section">
      <div class="section-title">Personnel by Service</div>
      ${persSvc.map(p => `
        <div class="pers-row">
          <span class="pers-label">${p.label}</span>
          <div class="pers-bar-bg"><div class="pers-bar-fill" style="width:${p.val ? Math.round(p.val/persTotal*100) : 0}%;background:${p.color}"></div></div>
          <span class="pers-count">${p.val ? fmtNum(p.val) : 'N/A'}</span>
        </div>`).join('')}
    </div>
    
    ${typeRows.length ? `
    <div class="section">
      <div class="section-title">Contract Spending by Type</div>
      ${typeRows.map(r => `
        <div class="type-row">
          <span class="type-label">${r.label}</span>
          <div class="type-bar-bg"><div class="type-bar-fill" style="width:${Math.round(r.pct)}%;background:${typeColors[r.label] || '#64748b'}"></div></div>
          <span class="type-pct">${r.pct.toFixed(0)}%</span>
        </div>`).join('')}
    </div>` : ''}
  `;
}

function renderContractors(sd) {
  const contractors = sd.top_contractors;
  if (!contractors || !contractors.length) return '<div class="no-data">No contractor data available.</div>';
  const max = contractors[0].amount_fy2024 || 1;
  return `
    <div class="section">
      <div class="section-title">Top 10 Defense Contractors — FY2024</div>
      ${contractors.map((c, i) => `
        <div class="contractor-row">
          <span class="c-rank">${i+1}</span>
          <span class="c-name">${c.company}</span>
          <div class="c-bar-wrap"><div class="c-bar-bg"><div class="c-bar-fill" style="width:${Math.round(c.amount_fy2024/max*100)}%"></div></div></div>
          <span class="c-amt">${fmt(c.amount_fy2024)}</span>
        </div>`).join('')}
    </div>
    <div style="font-size:10px;color:var(--text-muted);margin-top:8px;">Source: OLDCC Defense Spending by State FY2024. Figures reflect prime and sub-award contract obligations.</div>
  `;
}

function renderInstallations(sd) {
  const inst = sd.installations;
  if (!inst || !inst.sites || !inst.sites.length) return '<div class="no-data">No installation data available.</div>';
  
  const byBranch = {};
  inst.sites.forEach(s => {
    if (!byBranch[s.branch]) byBranch[s.branch] = [];
    byBranch[s.branch].push(s);
  });
  const branchOrder = ['Army','Air Force','Navy','Marine Corps','Army National Guard','Air National Guard','Army Reserve','Air Force Reserve','Navy Reserve','Marine Corps Reserve','DoD/WHS','Other'];
  const ordered = branchOrder.filter(b => byBranch[b]).concat(Object.keys(byBranch).filter(b => !branchOrder.includes(b)));
  
  return `
    <div class="section">
      <div class="section-title">${inst.total_count} Active Installations</div>
      ${ordered.map(branch => `
        <div class="inst-branch">
          <div class="inst-branch-name">${branch} (${byBranch[branch].length})</div>
          <div>${byBranch[branch].map(s => `<span class="inst-tag${s.isJointBase?' joint':''}">${s.name}${s.isJointBase?' ★':''}</span>`).join('')}</div>
        </div>`).join('')}
    </div>
    <div style="font-size:10px;color:var(--text-muted);margin-top:8px;">Source: BTS/DISDI National Transportation Atlas Database, FY2024. ★ = Joint Base designation. Active sites only.</div>
  `;
}

function renderFFRDC(sd) {
  const ffrdcs = sd.ffrdc;
  if (!ffrdcs || !ffrdcs.length) return '<div class="no-data">No FFRDCs based in this state.</div>';
  
  const getBadge = (sponsor, dod) => {
    if (dod) return '<span class="ffrdc-badge dod">DoD Sponsored</span>';
    if (sponsor.includes('Energy')) return '<span class="ffrdc-badge doe">DoE &mdash; Defense Relevant</span>';
    if (sponsor.includes('Homeland')) return '<span class="ffrdc-badge dhs">DHS &mdash; Defense Relevant</span>';
    return '';
  };
  
  return `
    <div class="section">
      <div class="section-title">Federally Funded R&D Centers</div>
      ${ffrdcs.map(f => `
        <div class="ffrdc-card">
          <div class="ffrdc-name">${f.name}</div>
          <div class="ffrdc-admin">&#x1F3DB; ${f.administrator}</div>
          <div class="ffrdc-sponsor">&#x1F4CD; ${f.location} &mdash; ${f.sponsor}</div>
          ${f.notes ? `<div style="font-size:10px;color:var(--text-muted);margin-top:4px;">${f.notes}</div>` : ''}
          ${getBadge(f.sponsor, f.dod_sponsored)}
        </div>`).join('')}
    </div>
    <div style="font-size:10px;color:var(--text-muted);margin-top:8px;">Source: NSF NCSES Master Government List of FFRDCs, February 2026.</div>
  `;
}

function renderCongressional(sd) {
  const cong = sd.congressional;
  const empty = v => !v || !v.length;

  const renderMembers = (members, showDistrict) => {
    if (empty(members)) return '<div class="no-data">None from this state.</div>';
    return members.map(m => `
      <div class="member-row">
        <div class="party-dot party-${m.party}"></div>
        <span class="member-name">${m.name}</span>
        ${showDistrict && m.district ? `<span class="member-dist">${m.district}</span>` : ''}
        <span class="member-role">${m.role}${m.ex_officio ? ' <span style="font-size:9px;color:var(--text-muted)">(non-voting)</span>' : ''}</span>
      </div>`).join('');
  };

  const groups = [
    {
      label: 'Armed Services',
      committees: [
        { key: 'hasc',  name: 'House Armed Services Committee (HASC)', house: true },
        { key: 'sasc',  name: 'Senate Armed Services Committee (SASC)', house: false },
      ]
    },
    {
      label: 'Defense Appropriations',
      committees: [
        { key: 'house_defense_approps', name: 'House Defense Appropriations Subcommittee', house: true },
        { key: 'senate_defense_approps', name: 'Senate Defense Appropriations Subcommittee', house: false },
      ]
    },
    {
      label: 'Intelligence',
      committees: [
        { key: 'hpsci', name: 'House Permanent Select Committee on Intelligence (HPSCI)', house: true },
        { key: 'ssci',  name: 'Senate Select Committee on Intelligence (SSCI)', house: false },
      ]
    },
    {
      label: 'Foreign Relations / Affairs',
      committees: [
        { key: 'hfac',  name: 'House Committee on Foreign Affairs (HFAC)', house: true },
        { key: 'sfrc',  name: 'Senate Committee on Foreign Relations (SFRC)', house: false },
      ]
    }
  ];

  const hasAny = groups.some(g => g.committees.some(c => !empty(cong[c.key])));
  if (!hasAny) return '<div class="no-data">No members on tracked defense or national security committees in the 119th Congress.</div>';

  return groups.map(g => {
    const rows = g.committees.map(c => {
      const members = cong[c.key] || [];
      if (!members.length) return '';
      return `<div class="committee-block">
        <div class="committee-name">${c.name}</div>
        ${renderMembers(members, c.house)}
      </div>`;
    }).join('');
    if (!rows) return '';
    return `<div style="margin-bottom:4px;">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent3);margin-bottom:8px;padding-top:4px;">${g.label}</div>
      ${rows}
    </div>`;
  }).join('') + '<div style="font-size:10px;color:var(--text-muted);margin-top:8px;">119th Congress (2025–2027). Sources: official committee websites, verified June 24–25, 2026. Territory delegates (Moylan/GU on HASC + HFAC, Plaskett/USVI on HPSCI, Radewagen/AS on HFAC) excluded.</div>';
}

</script>
